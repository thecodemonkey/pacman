name: Deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy with cleanup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            # Stop existing container
            docker stop pacman || true

            # Remove all stopped containers, unused images, networks, etc.
            docker system prune -af

            # Run new container with latest image
            docker run -d --name pacman \
              -p 7172:80 \
              ghcr.io/thecodemonkey/pacman:latest